name: Deploy launch-mvp to GitHub Pages

on:
  push:
    branches: [launch-mvp]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: launch-mvp

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # NOTE: GitHub Pages is static-only hosting — it cannot serve the
        # api/optimize.py OR-Tools function. On this deploy target, Build
        # Routes always falls back to the in-browser heuristic. Deploy to
        # Vercel (or another Python-capable host) to get real OR-Tools
        # optimization in production.
        run: npm run build
        env:
          VITE_MAP_TILE_URL:         ${{ secrets.VITE_MAP_TILE_URL }}
          VITE_MAP_TILE_ATTRIBUTION: ${{ secrets.VITE_MAP_TILE_ATTRIBUTION }}
          VITE_ORS_API_KEY:          ${{ secrets.VITE_ORS_API_KEY }}
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:    ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # No environment block — removes the protection gate that was blocking
    # non-main branches from deploying to github-pages
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
